<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">    
    <!-- Bootstrap CSS & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!--- Custom External CSS -->
    <link rel="stylesheet" href="login.css">
    <!--Formats Respected or equivalent in phones,tablets,pcs-->
    <link rel="stylesheet" href="responsive.css">
</head>
<body>
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card login-card p-4 p-md-5 shadow-lg glass-card" id="cardContainer">
      <div class="card-body" id="loginContainer">
        <h2 class="text-center mb-4 fw-bold formal-header">Welcome Back</h2>
        <form id="loginForm" novalidate autocomplete="off">
          <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="emailInput" placeholder="Enter email" required autocomplete="off" title='the mail must follow this form "folenfoleni@domain.ext"'>
            <label for="emailInput"><i class="bi bi-envelope-fill me-2"></i>Email address</label>
            <div class="invalid-feedback ps-2">Please enter a valid email address.</div>
          </div>
          <div class="input-group mb-1">
            <div class="form-floating flex-grow-1">
                        <input type="password" class="form-control" id="passwordInput" placeholder="Password" required autocomplete="new-password" title="the password is required ">
              <label for="passwordInput"><i class="bi bi-lock-fill me-2"></i>Password</label>
            </div>
            <button class="btn btn-outline-secondary text-dark" type="button" id="togglePassword">
              <i class="bi bi-eye" id="toggleIcon"></i>
            </button>
          </div>
          <div class="progress mb-3" style="height: 6px;">
            <div class="progress-bar" id="strengthBar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
          </div>
          <div class="invalid-feedback d-block ps-2 mb-3 d-none" id="passwordError">
          </div>
          <button type="submit" class="btn btn-dark btn-lg w-100 rounded-pill mt-3 shadow-sm pulse-btn" id="loginBtn">
            <span id="btnText">Sign In</span>
            <span class="spinner-border spinner-border-sm d-none" id="btnSpinner" role="status" aria-hidden="true"></span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
